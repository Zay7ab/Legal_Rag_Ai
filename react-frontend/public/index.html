<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Matches the logo's ground colour, so the browser chrome / PWA splash
         blends into the mark instead of framing it. -->
    <meta name="theme-color" content="#04332E" />

    <title>Legal Rag Ai — Pakistani law, in plain language</title>
    <meta name="description" content="Ask about Pakistani law in English or Urdu. Every answer names the statute it came from — or says plainly when it found none. Case law search, document drafting, and your rights explained." />

    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Link previews (WhatsApp is how this will actually get shared in Pakistan) -->
    <meta property="og:title" content="Legal Rag Ai — Pakistani law, in plain language" />
    <meta property="og:description" content="Ask about Pakistani law in English or Urdu. Every answer names the statute it came from." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts are @imported by index.css; preconnect so they don't block paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <noscript>Legal Rag Ai needs JavaScript enabled to run.</noscript>
    <div id="root"></div>
  </body>
</html>
